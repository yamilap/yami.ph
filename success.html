<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pago aprobado | YAMI.PH</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#151515;
padding:40px;
border-radius:25px;
text-align:center;
border:1px solid #222;
max-width:500px;
width:90%;
}

h1{
margin-top:0;
}

.download-btn{
margin-top:25px;
display:inline-block;
padding:18px 30px;
background:white;
color:black;
text-decoration:none;
border-radius:14px;
font-weight:bold;
}

.loader{
margin-top:20px;
opacity:.7;
}

</style>

</head>

<body>

<div class="box">

<h1>
✅ Pago aprobado
</h1>

<p>
Tus fotos HD están listas para descargar
</p>

<div
class="loader"
id="loader">

Preparando descarga...

</div>

<a
id="downloadBtn"
class="download-btn"
style="display:none;">

Descargar Fotos HD

</a>

</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

const orderId =
params.get("order");

const downloadBtn =
document.getElementById(
"downloadBtn"
);

if(!orderId){

document.body.innerHTML = `

<h1 style="
color:white;
font-family:Arial;
">

Orden inválida

</h1>

`;

}else{

const downloadUrl =
`http://localhost:3000/download/${orderId}`;

downloadBtn.href =
downloadUrl;

document.getElementById(
"loader"
).style.display = "none";

downloadBtn.style.display =
"inline-block";

/* DESCARGA AUTOMATICA */

window.location.href =
downloadUrl;

}

</script>

</body>
</html>
