<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin | YAMI.PH</title>

<link rel="stylesheet"
href="css/style.css">

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
margin:0;
}

.admin-container{
padding:30px;
max-width:1400px;
margin:auto;
}

.admin-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logout-btn{
background:red;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.admin-box{
background:#161616;
border:1px solid #222;
padding:25px;
border-radius:20px;
margin-bottom:20px;
}

.admin-box h2{
margin-top:0;
}

.admin-box input{
width:100%;
padding:15px;
margin-bottom:15px;
background:#0f0f0f;
border:1px solid #222;
color:white;
border-radius:12px;
box-sizing:border-box;
}

.admin-box button{
padding:15px 20px;
background:white;
color:black;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.preview{
margin-top:20px;
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.preview img{
width:100%;
height:250px;
object-fit:cover;
border-radius:15px;
border:1px solid #222;
}

.events-list{
margin-top:20px;
display:grid;
gap:15px;
}

.event-item{
background:#0f0f0f;
padding:20px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #222;
}

.delete-btn{
background:red;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.loading{
margin-top:15px;
color:#00ff99;
font-weight:bold;
display:none;
}

</style>

</head>

<body>

<div class="admin-container">

<div class="admin-header">

<div>

<h1>YAMI.PH Admin</h1>
<p>Panel de control</p>

</div>

<button
class="logout-btn"
onclick="logout()">

Salir

</button>

</div>

<!-- SUBIR -->

<div class="admin-box">

<h2>Subir Evento</h2>

<input
type="text"
id="eventName"
placeholder="Ej: alianza_penarol">

<input
type="file"
id="photoInput"
multiple
accept="image/*">

<button onclick="uploadPhotos()">
Subir Fotos
</button>

<div
class="loading"
id="loading">

Subiendo fotos...

</div>

<div
class="preview"
id="preview">

</div>

</div>

<!-- CONFIG -->

<div class="admin-box">

<h2>Configuración de precios</h2>

<input
type="number"
id="singlePrice"
placeholder="Precio individual">

<input
type="number"
id="packQty"
placeholder="Cantidad pack">

<input
type="number"
id="packPrice"
placeholder="Precio pack">

<button onclick="saveConfig()">

Guardar configuración

</button>

</div>

<!-- EVENTOS -->

<div class="admin-box">

<h2>Eventos</h2>

<div
class="events-list"
id="eventsList">

</div>

</div>

</div>

<script>

/* =========================
   LOGIN
========================= */

if(localStorage.getItem("admin") !== "true"){

window.location =
"login.html";

}

function logout(){

localStorage.removeItem("admin");

window.location =
"login.html";

}

/* =========================
   PREVIEW
========================= */

const photoInput =
document.getElementById("photoInput");

const preview =
document.getElementById("preview");

photoInput.addEventListener("change",(e)=>{

preview.innerHTML = "";

const files =
e.target.files;

for(let file of files){

const reader =
new FileReader();

reader.onload = (event)=>{

const img =
document.createElement("img");

img.src =
event.target.result;

preview.appendChild(img);

};

reader.readAsDataURL(file);

}

});

/* =========================
   UPLOAD
========================= */

async function uploadPhotos(){

const loading =
document.getElementById("loading");

const eventName =
document.getElementById("eventName")
.value
.trim();

const files =
photoInput.files;

if(!eventName){

alert("Escribe un nombre para el evento");
return;

}

if(files.length === 0){

alert("Selecciona fotos");
return;

}

loading.style.display = "block";

try{

const formData =
new FormData();

formData.append(
"event",
eventName
);

for(let file of files){

formData.append(
"photos",
file
);

}

const response =
await fetch(
"http://localhost:3000/upload",
{
method:"POST",
body:formData
}
);

const data =
await response.json();

console.log(data);

if(data.success){

alert("Fotos subidas correctamente");

preview.innerHTML = "";

photoInput.value = "";

document.getElementById(
"eventName"
).value = "";

loadEvents();

}else{

alert(
data.error ||
"Error subiendo fotos"
);

}

}catch(error){

console.log(error);

alert(
"Error conectando con el servidor"
);

}

loading.style.display = "none";

}

/* =========================
   EVENTS
========================= */

async function loadEvents(){

const container =
document.getElementById("eventsList");

container.innerHTML =
"<p>Cargando...</p>";

try{

const response =
await fetch(
"http://localhost:3000/events"
);

const events =
await response.json();

container.innerHTML = "";

if(events.length === 0){

container.innerHTML = `

<p>
No hay eventos todavía
</p>

`;

return;

}

events.forEach(event=>{

const div =
document.createElement("div");

div.className =
"event-item";

div.innerHTML = `

<div>

<h3>
${event.name}
</h3>

<p>
${event.photosCount} fotos
</p>

</div>

<button
class="delete-btn"
onclick="deleteEvent('${event.id}')">

Eliminar

</button>

`;

container.appendChild(div);

});

}catch(error){

console.log(error);

container.innerHTML = `

<p style="color:red;">
Error cargando eventos
</p>

`;

}

}

/* =========================
   DELETE
========================= */

async function deleteEvent(id){

const confirmDelete =
confirm("Eliminar evento?");

if(!confirmDelete) return;

await fetch(
`http://localhost:3000/delete/${id}`,
{
method:"DELETE"
}
);

loadEvents();

}

/* =========================
   CONFIG
========================= */

async function loadConfig(){

try{

const response =
await fetch(
"http://localhost:3000/config"
);

const config =
await response.json();

document.getElementById(
"singlePrice"
).value =
config.singlePrice;

document.getElementById(
"packQty"
).value =
config.packQty;

document.getElementById(
"packPrice"
).value =
config.packPrice;

}catch(error){

console.log(error);

}

}

async function saveConfig(){

const singlePrice =
document.getElementById(
"singlePrice"
).value;

const packQty =
document.getElementById(
"packQty"
).value;

const packPrice =
document.getElementById(
"packPrice"
).value;

await fetch(
"http://localhost:3000/config",
{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({
singlePrice,
packQty,
packPrice
})
}
);

alert("Configuración guardada");

}

/* =========================
   INIT
========================= */

loadEvents();
loadConfig();

</script>

</body>

</html>
