<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login Admin | YAMI.PH</title>

<link rel="stylesheet"
href="css/style.css">

<style>

.login-container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
background:#161616;
padding:40px;
border-radius:20px;
width:100%;
max-width:400px;
border:1px solid #222;
}

.login-box h2{
margin-bottom:25px;
text-align:center;
}

.login-box input{
width:100%;
padding:15px;
margin-bottom:15px;
background:#0f0f0f;
border:1px solid #222;
color:white;
border-radius:12px;
}

.login-box button{
width:100%;
padding:15px;
background:white;
color:black;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
text-align:center;
}

</style>

</head>

<body>

<div class="login-container">

<div class="login-box">

<h2>Admin YAMI.PH</h2>

<input
type="password"
id="password"
placeholder="Contraseña">

<button onclick="login()">
Ingresar
</button>

<p class="error"
id="error"></p>

</div>

</div>

<script>

function login(){

const password =
document.getElementById("password").value;

const error =
document.getElementById("error");

if(password === "yamiph2026"){

localStorage.setItem("admin","true");

window.location =
"admin.html";

}else{

error.innerText =
"Contraseña incorrecta";

}

}

</script>

</body>

</html>
