<!DOCTYPE html>
<html lang="es">

<body>

<header class="navbar">

    <div class="logo">

        <img src="img/logo.png">

    <nav>

            <div class="img-container">

                <img

                draggable="false"
                >

                <div class="watermark">

                    <img src="img/logo.png">

                </div>

            </div>

            <div class="card-info">

                <button class="select-btn">

                    <i class="fa-solid fa-cart-shopping"></i>

                </button>

            </div>

        </div>

        <!-- FOTO -->

        <div class="card">

            <div class="img-container">

                    <img src="img/logo.png">

        </div>

        <!-- FOTO -->

        <div class="card">

            <div class="img-container">

                >

                <div class="watermark">

                    <img src="img/logo.png">

                </div>

            </div>

            <div class="card-info">

                <button class="select-btn">

                    <i class="fa-solid fa-cart-shopping"></i>

                    Seleccionar

                </button>

            </div>

        </div>

    </div>

    <!-- BOTON -->

    <div class="comprar-container">

        <button onclick="enviarWhatsApp()" class="comprar-btn">

            <i class="fa-brands fa-whatsapp"></i>

            COMPRAR FOTOS

        </button>

    </div>

</section>

<script src="app.js"></script>
